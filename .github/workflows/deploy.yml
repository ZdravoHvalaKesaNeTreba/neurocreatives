name: Deploy to Yandex Cloud VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 84.201.150.6
        username: yc-user
        key: ${{ secrets.YC_SSH_KEY }}
        script: |
          cd /apps/neurocreatives
          git pull origin main
          
          # Остановка всего на порту 8000
          docker compose down --remove-orphans 2>/dev/null || true
          docker stop neurocreatives 2>/dev/null || true
          docker rm neurocreatives 2>/dev/null || true
          docker ps -q --filter "publish=8000" | xargs -r docker stop 2>/dev/null || true
          docker ps -aq --filter "publish=8000" | xargs -r docker rm 2>/dev/null || true
          sudo fuser -k 8000/tcp 2>/dev/null || true
          sleep 2
          
          # Сборка и запуск
          set -e
          docker compose build --no-cache
          docker compose up -d
          docker system prune -f
          docker compose ps
          echo "✅ Deployment completed!"
