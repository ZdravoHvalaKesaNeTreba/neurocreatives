# docker-compose.local.yml — конфигурация для локальной разработки
#
# Запуск:
#   docker compose -f docker-compose.local.yml up --build
#
# Остановка:
#   docker compose -f docker-compose.local.yml down
#
# Полный сброс (включая БД):
#   docker compose -f docker-compose.local.yml down -v

services:

  # ── PostgreSQL (локальная БД) ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: neurocreatives-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: neurocreatives
      POSTGRES_PASSWORD: neurocreatives_local
      POSTGRES_DB: neurocreatives
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurocreatives -d neurocreatives"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Приложение Neurocreatives ──────────────────────────────
  neurocreatives:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: neurocreatives-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # ── Database (локальный PostgreSQL) ──
      DATABASE_URL: postgresql+psycopg://neurocreatives:neurocreatives_local@postgres:5432/neurocreatives
      # ── Telegram API ──
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      # ── OpenAI ──
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # ── Каналы для парсинга ──
      CHANNELS_TO_PARSE: ${CHANNELS_TO_PARSE:-GuerrillaMarketing,Durov,sostav}
      # ── Server ──
      HOST: "0.0.0.0"
      PORT: "8000"
      # ── Планировщик (отключить при отладке: true) ──
      DISABLE_SCHEDULER: ${DISABLE_SCHEDULER:-false}
    volumes:
      # Скачанные изображения — сохраняются между перезапусками
      - ./downloads:/app/downloads
      # Telegram-сессия — чтобы не проходить авторизацию каждый раз
      - ./parser_session.session:/app/parser_session.session
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  pgdata:
    driver: local
